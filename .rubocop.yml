---
AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable
  SuggestExtensions: true
  Exclude:
    - _snippets/**/*

plugins:
  - rubocop-minitest
  - rubocop-performance
  - rubocop-rake
  - rubocop-sequel

Metrics/BlockLength:
  Enabled: true
  Exclude:
    - spec/**/* # Minitest's nested test structure requires large blocks
    - Rakefile # Rake namespaces produce large blocks
    - app/controllers/*.rb # Roda's nested controllers require large blocks

Security/YAMLLoad:
  Enabled: true
  Exclude:
    - spec/**/*

Style/HashSyntax:
  Enabled: true
  Exclude:
    - Rakefile

Style/SymbolArray:
  Enabled: true
  Exclude:
    # - Rakefile
    - db/migrations/*.rb
